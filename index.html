<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しみず＆あゆみ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ヘッダー（日付・天気） -->
    <header class="header-info">
        <div class="date-weather-container">
            <div class="current-date" id="currentDate"></div>
            <div class="weather-info" id="weatherInfo">
                <span class="weather-temp" id="weatherTemp">--</span>
                <span class="weather-desc" id="weatherDesc">天気を読み込み中...</span>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- ナビゲーションタブ -->
        <nav class="tab-navigation">
            <button class="tab-button active" data-tab="relationship">交際期間</button>
            <button class="tab-button" data-tab="memories">思い出フォルダー</button>
            <button class="tab-button" data-tab="calendar">カレンダー</button>
        </nav>

        <!-- コンテンツ -->
        <main class="content">
            <!-- 交際期間タブ -->
            <section id="relationship" class="tab-content active">
                <h2>交際期間</h2>
                <div class="relationship-container">
                    <p class="start-date">開始日：2025年11月9日</p>
                    <div class="days-counter">
                        <span id="dayCount" class="days-number">0</span>
                        <p class="days-label">日間一緒にいます💕</p>
                    </div>
                </div>
            </section>

            <!-- 思い出フォルダータブ -->
            <section id="memories" class="tab-content">
                <h2>思い出フォルダー</h2>

                <!-- ハッシュタグ検索バー -->
                <div class="hashtag-search-bar">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="hashtagSearchInput" class="hashtag-search-input" placeholder="#ハッシュタグで検索...">
                        <button id="hashtagSearchClear" class="search-clear-btn hidden">✕</button>
                    </div>
                    <div id="searchResultInfo" class="search-result-info hidden"></div>
                </div>

                <div class="memory-upload-area">
                    <label for="imageUpload" class="upload-label">
                        <div class="upload-box">
                            <p class="upload-icon">📷</p>
                            <p class="upload-text">クリックして写真をアップロード</p>
                            <p class="upload-subtitle">または、ここにドラッグ＆ドロップ</p>
                        </div>
                        <input type="file" id="imageUpload" accept="image/*" hidden>
                    </label>
                </div>

                <!-- プレビュー領域 -->
                <div id="previewArea" class="preview-area hidden">
                    <div class="preview-container">
                        <img id="previewImage" src="" alt="プレビュー">
                    </div>
                    <div class="photo-meta-inputs">
                        <textarea id="photoComment" class="meta-textarea" placeholder="コメントを入力..." rows="2"></textarea>
                        <div class="hashtag-input-wrapper">
                            <span class="hashtag-prefix">#</span>
                            <input type="text" id="photoHashtags" class="meta-input" placeholder="タグ1 タグ2 タグ3（スペース区切り）">
                        </div>
                    </div>
                    <div class="preview-buttons">
                        <button id="nowButton" type="button" class="now-button">Now</button>
                        <button id="cancelButton" type="button" class="cancel-button">キャンセル</button>
                    </div>
                    <p id="previewMessage" class="preview-message"></p>
                </div>

                <div id="photoGallery" class="photo-gallery"></div>

                <!-- 画像表示モーダル -->
                <div id="photoModal" class="photo-modal hidden">
                    <div class="modal-content">
                        <button id="modalCloseBtn" class="modal-close">✕</button>
                        <img id="modalImage" src="" alt="拡大画像">
                        <div class="modal-info">
                            <p id="modalDate" class="modal-date"></p>
                            <p id="modalComment" class="modal-comment"></p>
                            <div id="modalHashtags" class="modal-hashtags"></div>
                            <button id="modalDeleteBtn" class="modal-delete-btn">削除</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- カレンダータブ -->
            <section id="calendar" class="tab-content">
                <h2>カレンダー</h2>

                <!-- 表示切り替えコントロール -->
                <div class="calendar-controls">
                    <button class="calendar-nav-btn" id="calPrev">&#8592;</button>
                    <div class="calendar-center">
                        <span class="calendar-title" id="calendarTitle"></span>
                        <select id="calendarViewSelect" class="calendar-view-select">
                            <option value="month">月表示</option>
                            <option value="year">年表示</option>
                        </select>
                    </div>
                    <button class="calendar-nav-btn" id="calNext">&#8594;</button>
                </div>

                <!-- カレンダー本体 -->
                <div id="calendarBody" class="calendar-body"></div>
            </section>
        </main>
    </div>

    <!-- Firebase SDK (Compat版) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <script src="home.js"></script>
</body>
</html>
