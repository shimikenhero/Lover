<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しみず＆あゆみ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ナビゲーションタブ -->
        <nav class="tab-navigation">
            <button class="tab-button active" data-tab="relationship">交際期間</button>
            <button class="tab-button" data-tab="memories">思い出フォルダー</button>
        </nav>

        <!-- コンテンツ -->
        <main class="content">
            <!-- 交際期間タブ -->
            <section id="relationship" class="tab-content active">
                <h2>交際期間</h2>
                <div class="relationship-container">
                    <p class="start-date">開始日：2025年11月9日</p>
                    <div class="days-counter">
                        <span id="dayCount" class="days-number">0</span>
                        <p class="days-label">日間一緒にいます💕</p>
                    </div>
                </div>
            </section>

            <!-- 思い出フォルダータブ -->
            <section id="memories" class="tab-content">
                <h2>思い出フォルダー</h2>
                <div class="memory-upload-area">
                    <label for="imageUpload" class="upload-label">
                        <div class="upload-box">
                            <p class="upload-icon">📷</p>
                            <p class="upload-text">クリックして写真をアップロード</p>
                            <p class="upload-subtitle">または、ここにドラッグ＆ドロップ</p>
                        </div>
                        <input type="file" id="imageUpload" accept="image/*" hidden>
                    </label>
                </div>
                
                <!-- プレビュー領域 -->
                <div id="previewArea" class="preview-area hidden">
                    <div class="preview-container">
                        <img id="previewImage" src="" alt="プレビュー">
                        <button id="nowButton" class="now-button">Now</button>
                        <button id="cancelButton" class="cancel-button">キャンセル</button>
                    </div>
                    <p id="previewMessage" class="preview-message"></p>
                </div>
                
                <div id="photoGallery" class="photo-gallery">
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>
    
    <script src="home.js"></script>
</body>
</html>
